name: Deploy Spring Boot App to Azure Web App

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: banking-app-accounttransaction
  JAVA_VERSION: '21'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run Unit Tests
        run: mvn test

      - name: Build Application
        run: mvn clean verify

      - name: Build with Maven
        run: mvn clean package

      - name: Find JAR file
        id: jar
        run: |
          echo "path=$(ls target/*.jar | grep -v 'original' | head -n 1)" >> $GITHUB_OUTPUT

      - name: Print JAR path
        run: echo "${{ steps.jar.outputs.path }}"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ steps.jar.outputs.path }}